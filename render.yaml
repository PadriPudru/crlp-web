services:
  - type: web
    name: crlp-rugby
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm install --prefix server
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
